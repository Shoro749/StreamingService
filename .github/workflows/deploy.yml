name: Build and Deploy ASP.NET Core to Azure Web App

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      #  1. Забрати код з репозиторію
      - name: Checkout source
        uses: actions/checkout@v4

      #  2. Встановити .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      #  3. Відновлення залежностей
      - name: Restore dependencies
        run: dotnet restore

      # Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install npm dependencies
        run: npm install
        working-directory: ./StreamingService

      - name: Build Tailwind CSS
        run: npm run css:build
        working-directory: ./StreamingService

      #  4. Збірка
      - name: Build project
        run: dotnet build --configuration Release --no-restore

      #  5. Тести )
      - name: Run tests
        run: dotnet test --no-build --configuration Release
        continue-on-error: true

      #  6. Публікація (publish folder)
      - name: Publish app
        run: dotnet publish ./StreamingService/StreamingService.csproj -c Release -o publish
      #fdgfdgdfg
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      #  7. Деплой в Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: lumeo
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
